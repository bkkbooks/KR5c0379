front:
  text: 明真破妄章頌
  hash: sha256:886e920f24b9be03937df885837717efbf9521ba859541cdec3ab8e10ea43804
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0379_HFL_000-001a, image: hfl/0615/0615-110.png}
body:
  text: 虛靖張真君著道生天地混沌未分先有道道無形色亦無情自然化育生天地天道輕清地道寧天地生人道生天地始無名分判隂陽立五行人位其中靈萬物人從天地道生成人稟隂陽三才天地人同氣人稟先天一氣靈一氣具身名曰道感通天地及神明一氣生三一真真外更無真祖氣通霜具此身道一生三生妙用元精元氣與元神人身三寶元精元氣與元神三者無形亦有形運用得傳真可見光明無極是分明一氣相關雷乃先天氣化成諸天仙聖總同真我身一氣相關召同祖同宗貼骨親以心合神真心動處是雷機神合神兮妙更竒只此更無差别處如磁吸鐵不相違法即是心此心心外元無法呪訣符圖少合真心真將何為妙用靈光一點運元神神可通天元神直捧一封書一道寒光射太虛徑達玉京金闕去玄恩星火下天衢呼天叱吒叱吒望空將令打不識元神召使者天髙星遠豈能聞從便之乎并也者金光召雷金光灼灼照雷城百萬雷兵稟令行不用符圖並呪訣旱天能兩兩能晴妄想行持不悟隂陽闔關機想存作用總成癡雪符燒盡千千道兩澤何曽一點施真念降魔降魔何處是工夫中有元神神定居慧劔揮時神鬼伏便教禍害自然除心妄鬼欺妄念紛紛且失真符圖呪訣費精神鬼神一見嘻嘻笑打石拋磚更害人祖氣陽晶先天祖氣至陽晶鍊盡隂魂一性靈九轉玄功成項刻隂陽交姤結胎嬰辨真隂陽真隂真陽既不識木可浴兮火可炙靈光一點不分明受度亡魂有何益南昌非心玄關一竅有隂陽心腎元非水火𦂧寄語鍊師髙著眼莫將心府作南昌普度有法普度工夫又不同金光灼灼照羅酆黍珠一顆空懸處太極還歸無極中取氣不同昧却自家元氣主妄想天罡對空取恰似騎牛去覓牛此等之人何足語不識元神召將光轟令一聲令聲驚起我元神緣何不見元神面只為時人昧本真印須心印心印相傳付有緣令人印木不知玄祖師心印相同處顆顆光明徹九天靈光一點書符道妙起工夫委聚毫端篆作符著相想存行呪訣將來只是墨和朱先天字號號頭用處須天篆元是皇人接筆書奢頡後天塵世字用之總是感迷愚妄想隂陽隂陽吞啖運符中心腎盈虧黑與紅一箇乾坤如許大這些伎倆豈能通腎中一點兩腎中間一點明癡人守此欲通靈誰知此處皆隂氣著比陽晶隔萬程心下元神人言心下一包空精氣元神聚此中何似癡人容易惑蓋緣不識主人翁膽非雷府妄將藏腑作雷霆怒氣膨膨起震驚擊破琉璃瓶子後何曽聞得有雷聲誤指雷霆一陽生處地雷復外腎應非雷所居穢濁聖賢難懴悔將來必定被雷誅不辨真陽心肝脾肺腎膽府噓呵呬嘻呼吹取父母后天隂陽氣如何可以祈晴兩七事純隂涕唾津精氣血液七件皆隂總無益身中只有一隂陽江湖多少無人識穢氣觸真有言臍下寸三分作用金光此處存豈識此中隂濁氣運成穢濁不堪聞似是而非妄言一竅在眉心直入三分可許深誤殺世人真可笑如將䃋石作黃金錯認後天臍輪後與腎相連兩處空空總後天若問先天玄妙處除非得遇至人傅雷動無時動雷有用雷霆煞又算停星日月時如此天機容易測兩暘何用法來祈邪能惑正幾多道眼不曽明役將祛神輒現形只為身中無主宰隂魂假托姓名靈當明真要一員神將數家法多是宗師撰造成更過幾年多是假行符呪水豈能靈作用兩全道法難忘呪與符必須道妙兩相扶先天玄妙工夫到呪訣符圖可有無道本法體法行大道合先天呪訣符圖總是玄至道杳然無所得符圖呪訣也徒然萬法歸一道生于一愎何疑可以無為可有為萬法本來歸一處何分正一與清微造化在我本質雖殊氣不殊當於親處下工夫人身大抵同天地造化隂陽總屬吾兀坐頑空無心兀兀坐多年將謂神仙巳有緣不解龍吟並虎嘯但知空坐也徒然隂陽互根頑石中空藏白玉縱饒見得光生目大隂元受太陽精初八上弦圓十六因法生謗本為同門共指迷上根一覽悟玄微若將此向愚癡説生謗生嗔總是非明真破妄章頌
