body:
  text: 虛靖張眞君著道生天地混沌未分先有道道无形色亦无情自然化育生天地天道輕清地道甯天地生人道生天地始无名分判陰陽立五行人位其中靈萬物人從天地道生成人稟陰陽三才天地人同炁人稟先天一炁靈一炁具身名曰道感通天地及神明一炁生三一眞眞外更無眞祖炁通靈具此身道一生三生妙用元精元氣與元神人身三寶元精元氣與元神三者无形亦有形運用得傳眞可見光明无極是分明一炁相關雷乃先天炁化成諸天仙聖總同眞我身一炁相關召同祖同宗貼骨親以心合神眞心動處是雷機神合神兮妙更奇只此更無差别處如磁吸鐵不相違法卽是心此心心外元无法呪訣符圖少合眞心眞將何爲妙用靈光一點運元神神可通天元神直捧一封書一道寒光射太虛徑達玉京金闕去玄恩星火下天衢呼天叱咤叱咤望空將令打不識元神召使者天高星遠豈能聞從便之乎并也者金光召雷金光灼灼照雷城百萬雷兵稟令行不用符圖幷呪訣旱天能雨雨能晴妄想行持不悟陰陽闔闢機想存作用總成癡雷符燒盡千千道雨澤何會一點施眞念降魔降魔何處是工夫中有元神靜定居慧劔揮時神鬼伏便教禍害自然除心妄鬼欺妄念紛紛且失眞符圖呪訣費精神鬼神一見嘻嘻笑打石抛磚更害人祖炁陽晶先天祖炁至陽晶鍊盡陰魂一性靈九轉玄功成頃刻陰陽交姤結胎嬰辨眞陰陽眞陰眞陽旣不識水可浴兮火可炙靈光一點不分明受度亡魂有何益南昌非心玄關一竅有陰陽心腎元非水火郷寄語鍊師高着眼莫將心府作南昌普度有法普度工夫又不同金光灼灼照羅酆黍珠一顆空懸處太極還歸无極中取炁不同昧卻自家元氣主妄想天罡對空取恰似騎牛去覓牛此等之人何足語不識元神召將先轟令一聲令聲驚起我元神緣何不見元神面只爲時人昧本眞印須心印心印相傳付有緣今人印木不知玄祖師心印相同處顆顆光明徹九天靈光一點書符道妙起工夫委聚毫端篆作符着相想存行呪訣將來只是墨和朱先天字號號頭用處須天篆元是皇人按筆書蒼頡後天塵世字用之總是惑迷愚妄想陰陽陰陽吞啖運符中心腎盈虧黑與紅一箇乾坤如許大這些伎倆豈能通腎中一點兩腎中間一點明癡人守此欲通靈誰知此處皆陰氣若比陽晶隔萬程心下元神人言心下一包空精氣元神聚此中何似癡人容易惑蓋緣不識主人翁膽非雷府妄將藏腑作雷霆怒氣膨膨起震驚擊破琉璃瓶子後何曾聞得有雷聲誤指雷霆一陽生處地雷復外腎應非雷所居穢濁聖賢難懴悔將來必定被雷誅不辨眞陽心肝脾肺腎膽府噓呵呬嘻呼吹取父母后天陰陽氣如何可以祈晴雨七事純陽涕唾津精氣血液七件皆陰總無益身中只有一陰陽江湖多少无人識穢氣觸眞有言臍下寸三分作用金光此處存豈識此中陰濁氣運成穢濁不堪聞似是而非妄言一竅在眉心直入三分可許深誤殺世人眞可笑如將䃋石作黃金錯認後天臍輪後與腎相連兩處空空總後天若問先天玄妙處除非得遇至人傳雷動無時動雷有用雷霆煞又算停星日月時如此天機容易測雨暘何用法來祈邪能惑正幾多道眼不曾明役將祛神輙現形只爲身中无主宰陰魂假托姓名靈當明眞要一員神將數家法多是宗師撰造成更過幾年多是假行符呪水豈能靈作用兩全道法難忘呪與符必須道妙兩相扶先天玄妙工夫到呪訣符圖可有無道本法體法行大道合先天呪訣符圖總是玄至道杳然无所得符圖呪訣也徒然萬法歸一道生于一復何疑可以无爲可有爲萬法本來歸一處何分正一與清微造化在我本質雖殊炁不殊當於親處下工夫人身大抵同天地造化陰陽總屬吾兀坐頑空无心兀兀坐多年將謂神仙巳有緣不解龍吟幷虎嘯但知空坐也徒然陰陽互根頑石中空藏白玉縱饒見得光生目太陰元受太陽精初八上弦圓十六因法生謗本爲同門共指迷上根一覽悟玄微若將此向愚癡說生謗生嗔總是非
